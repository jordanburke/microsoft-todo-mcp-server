allowBuilds:
  esbuild: false # binary ships via @esbuild/<platform> optional deps; build script not needed
minimumReleaseAgeExclude:
  - eslint-config-functype@2.104.1
  - eslint-plugin-functype@2.104.1
  - functype-os@1.4.1
  - "*functype*"
  - ts-builds
publicHoistPattern:
  - "*eslint*"
  - "*prettier*"
  - "*vitest*"
  - "typescript"
  - "globals" # required by eslint.config.js; not matched by *eslint* (ts-builds init omits it)
